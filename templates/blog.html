<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitaciones a Templos | Luz de Axé</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap" rel="stylesheet">
    
    <script src="https://pl28921986.effectivegatecpm.com/33/96/d4/3396d4ba8c55e1f559b3e387ff9e3e7a.js"></script>
</head>
<body class="bg-[#050A1F] text-white">

    <header class="p-6 text-center border-b border-[#BF953F]/30 bg-[#030614]">
        <h1 class="font-['Cinzel'] text-2xl text-[#FCF6BA] uppercase tracking-widest">Invitaciones y Fiestas</h1>
    </header>

    <main class="max-w-md mx-auto p-4">
        
        {% for inv in invitaciones %}
            <div class="mb-8 group">
                <div class="bg-[#0A1128] rounded-2xl overflow-hidden border border-[#BF953F]/20 shadow-xl">
                    <div class="p-3 border-b border-[#BF953F]/10">
                        <p class="text-[10px] text-[#BF953F] font-bold uppercase tracking-widest">{{ inv.templo }}</p>
                    </div>
                    
                    <a href="https://www.effectivegatecpm.com/hysks57n1q?key=cc089af4a8dac2392a3e8f421d826b05" target="_blank">
                        <img src="{{ inv.img }}" class="w-full h-auto opacity-90 hover:opacity-100 transition-opacity">
                    </a>

                    <div class="p-4 bg-[#030614]">
                        <a href="https://www.effectivegatecpm.com/hysks57n1q?key=cc089af4a8dac2392a3e8f421d826b05" 
                           class="block w-full bg-gradient-to-r from-[#BF953F] to-[#AA771C] text-black text-center font-black py-3 rounded-lg uppercase text-xs">
                            Ver Dirección y Horarios
                        </a>
                    </div>
                </div>

                {% if loop.index % 2 == 0 %}
                <div class="my-8 p-2 bg-black/40 rounded-xl border border-dashed border-gray-700">
                    <p class="text-[8px] text-center text-gray-500 mb-2 uppercase">Publicidad Patrocinada</p>
                    <script async="async" data-cfasync="false" src="https://pl28922009.effectivegatecpm.com/6f5b6d43fcd5992d22f3d1214c40d0db/invoke.js"></script>
                    <div id="container-6f5b6d43fcd5992d22f3d1214c40d0db"></div>
                </div>
                {% endif %}
            </div>
        {% endfor %}

    </main>

    <script src="https://pl28921994.effectivegatecpm.com/1a/8a/4e/1a8a4efb91cf5819f533fa2c97706910.js"></script>
</body>
</html>
