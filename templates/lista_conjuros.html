<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Libro de Conjuros Sagrados | Luz de Axé</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Lato:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://pl28921986.effectivegatecpm.com/33/96/d4/3396d4ba8c55e1f559b3e387ff9e3e7a.js"></script>

    <style>
        body { background-color: #050A1F; font-family: 'Lato', sans-serif; color: #E2E8F0; }
        .font-sacred { font-family: 'Cinzel', serif; }
        .gold-gradient { background: linear-gradient(135deg, #BF953F, #FCF6BA, #AA771C); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .spell-card { background: linear-gradient(180deg, #0A1128 0%, #030614 100%); border: 1px solid rgba(191, 149, 63, 0.2); }
        .spell-card:hover { border-color: #BF953F; box-shadow: 0 0 20px rgba(191, 149, 63, 0.1); }
    </style>
</head>
<body class="pb-20">

    <header class="pt-10 pb-6 text-center border-b border-[#BF953F]/30 bg-[#030614]">
        <a href="/">
            <h1 class="text-3xl font-sacred gold-gradient uppercase">Alta Magia</h1>
        </a>
        <p class="text-[10px] text-gray-500 tracking-[0.3em] mt-1">CONJUROS Y RITUALES</p>
    </header>

    <main class="max-w-2xl mx-auto px-4 mt-8">
        
        <div class="space-y-6">
            {% for id, conjuro in conjuros.items() %}
                <div class="spell-card rounded-3xl p-6 relative overflow-hidden group">
                    <div class="absolute -right-4 -top-4 text-6xl opacity-10 group-hover:rotate-12 transition-transform">🕯️</div>
                    
                    <div class="relative z-10">
                        <h2 class="font-sacred text-xl text-[#FCF6BA] mb-2 uppercase tracking-tight">{{ conjuro.titulo }}</h2>
                        <p class="text-sm text-gray-400 mb-6 leading-relaxed">{{ conjuro.resumen }}</p>
                        
                        <a href="https://www.effectivegatecpm.com/hysks57n1q?key=cc089af4a8dac2392a3e8f421d826b05" 
                           class="inline-block w-full bg-transparent border border-[#BF953F] text-[#BF953F] text-center font-bold py-3 rounded-xl uppercase text-[10px] tracking-widest hover:bg-[#BF953F] hover:text-black transition-all">
                            Revelar Ritual Completo
                        </a>
                    </div>
                </div>

                {% if loop.index % 2 == 0 %}
                    <div class="my-8 py-4 bg-[#030614] rounded-2xl border border-gray-800 text-center">
                        <p class="text-[8px] text-gray-600 mb-2 uppercase">Recomendado por los Guías</p>
                        <script async="async" data-cfasync="false" src="https://pl28922009.effectivegatecpm.com/6f5b6d43fcd5992d22f3d1214c40d0db/invoke.js"></script>
                        <div id="container-6f5b6d43fcd5992d22f3d1214c40d0db"></div>
                    </div>
                {% endif %}
            {% endfor %}
        </div>

        <div class="mt-12 flex justify-center">
            <script>
                atOptions = { 'key' : '1d86bff3f179c4da252a15191eba7ed6', 'format' : 'iframe', 'height' : 300, 'width' : 160, 'params' : {} };
            </script>
            <script src="https://www.highperformanceformat.com/1d86bff3f179c4da252a15191eba7ed6/invoke.js"></script>
        </div>

    </main>

    <script src="https://pl28921994.effectivegatecpm.com/1a/8a/4e/1a8a4efb91cf5819f533fa2c97706910.js"></script>

</body>
</html>
